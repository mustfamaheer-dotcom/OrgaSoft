<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Connection Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ccc;
        }
        .test.success {
            border-left-color: #4caf50;
        }
        .test.error {
            border-left-color: #f44336;
        }
        .test.pending {
            border-left-color: #ff9800;
        }
        button {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        h1 {
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <h1>🔥 Firebase Connection Test</h1>
    <p>This page tests your Firebase Realtime Database connection.</p>

    <div>
        <button onclick="testRead()">Test Read</button>
        <button onclick="testWrite()">Test Write</button>
        <button onclick="testAuth()">Test Auth</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script type="module">
        const DB_URL = 'https://orga4soft-35b70-default-rtdb.firebaseio.com';
        
        window.testRead = async function() {
            addTest('Reading from Firebase...', 'pending');
            try {
                const response = await fetch(`${DB_URL}/siteData.json`);
                const data = await response.json();
                
                if (data) {
                    addTest('✅ Read Success!', 'success');
                    addTest(`<pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>`, 'success');
                } else {
                    addTest('⚠️ No data found in Firebase', 'error');
                }
            } catch (error) {
                addTest(`❌ Read Error: ${error.message}`, 'error');
            }
        };

        window.testWrite = async function() {
            addTest('Writing test data to Firebase...', 'pending');
            try {
                const testData = {
                    test: true,
                    timestamp: new Date().toISOString(),
                    message: 'Test from diagnostic page'
                };
                
                const response = await fetch(`${DB_URL}/test.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const result = await response.json();
                addTest('✅ Write Success!', 'success');
                addTest(`<pre>${JSON.stringify(result, null, 2)}</pre>`, 'success');
            } catch (error) {
                addTest(`❌ Write Error: ${error.message}`, 'error');
                addTest('Check Firebase Database Rules - they might be blocking writes', 'error');
            }
        };

        window.testAuth = async function() {
            addTest('Testing Firebase Authentication...', 'pending');
            try {
                // Import Firebase Auth
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getAuth, signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
                
                const firebaseConfig = {
                    apiKey: "AIzaSyBEJxwaC5tvUkYjMF6jiUfzP7WUiz3WPzE",
                    authDomain: "orga4soft-35b70.firebaseapp.com",
                    databaseURL: "https://orga4soft-35b70-default-rtdb.firebaseio.com",
                    projectId: "orga4soft-35b70",
                    storageBucket: "orga4soft-35b70.firebasestorage.app",
                    messagingSenderId: "818170755912",
                    appId: "1:818170755912:web:cd372b54da0055ebebd17d"
                };
                
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                const email = prompt('Enter email (admin@orga.com):');
                const password = prompt('Enter password:');
                
                if (email && password) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    addTest('✅ Authentication Success!', 'success');
                    addTest(`Logged in as: ${userCredential.user.email}`, 'success');
                } else {
                    addTest('⚠️ Test cancelled', 'error');
                }
            } catch (error) {
                addTest(`❌ Auth Error: ${error.message}`, 'error');
                if (error.code === 'auth/user-not-found') {
                    addTest('User not found. Create user in Firebase Console → Authentication', 'error');
                } else if (error.code === 'auth/wrong-password') {
                    addTest('Wrong password', 'error');
                }
            }
        };

        window.clearResults = function() {
            document.getElementById('results').innerHTML = '';
        };

        function addTest(message, status) {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        // Auto-run read test on load
        window.addEventListener('load', () => {
            addTest('🚀 Firebase Diagnostic Tool Loaded', 'success');
            addTest('Click buttons above to test Firebase connection', 'pending');
        });
    </script>
</body>
</html>
